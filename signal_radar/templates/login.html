<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yams Radar — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #22c55e;
  --accent-light: #4ade80;
  --accent-dark: #16a34a;
  --accent-darkest: rgba(5, 46, 22, 0.8);
  --accent-glow: rgba(34, 197, 94, 0.15);
  --bg-primary: #080a0b;
  --bg-secondary: #0d0f12;
  --bg-card: rgba(13, 15, 18, 0.7);
  --bg-card-hover: rgba(20, 25, 22, 0.85);
  --border: rgba(255, 255, 255, 0.05);
  --border-accent: rgba(34, 197, 94, 0.15);
  --text: #e8eaed;
  --text-dim: #9aa0a6;
  --text-muted: #5f6368;
  --green: #22c55e;
  --red: #ef4444;
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-container {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 28px;
  backdrop-filter: blur(10px);
}
.logo {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 4px;
  background: linear-gradient(135deg, var(--accent-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 28px;
}
.form-group {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input {
  width: 100%;
  padding: 11px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border 0.15s;
}
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
input::placeholder { color: var(--text-muted); }
.btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}
.btn-accent { background: var(--accent); color: #000; }
.btn-accent:hover { background: var(--accent-light); transform: translateY(-1px); }
.btn-accent:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; display: none; }
.loading { display: none; text-align: center; padding: 20px 0; color: var(--text-dim); }
.loading .spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 2FA screen (hidden initially) */
#totp-screen { display: none; }
#totp-screen .totp-title { text-align: center; font-size: 14px; margin-bottom: 16px; color: var(--text-dim); }
#totp-screen input { text-align: center; font-size: 24px; letter-spacing: 8px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">YAMS RADAR</div>
    <div class="subtitle">Multi-Asset Trading Bias Scanner</div>

    <!-- Login form -->
    <div id="login-screen">
      <div class="form-group">
        <label>Email / Mobile / Username</label>
        <input type="text" id="username" placeholder="Email, mobile number, or admin username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="error" id="login-error">Invalid credentials</div>
      <button class="btn btn-accent" id="login-btn" onclick="doLogin()">Sign In</button>
      <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--text-dim)">
        Don't have an account? <a href="/signup" style="color:var(--accent-light);text-decoration:none;font-weight:600">Sign Up</a>
      </div>
    </div>

    <!-- 2FA screen -->
    <div id="totp-screen">
      <div class="totp-title">🔐 Two-Factor Authentication</div>
      <div style="text-align:center;margin-bottom:12px;color:var(--text-dim);font-size:13px">
        Enter the 6-digit code from your authenticator app
      </div>
      <div class="form-group">
        <input type="text" id="totp-code" placeholder="000000" maxlength="6" inputmode="numeric"
               autocomplete="one-time-code"
               onkeydown="if(event.key==='Enter')verifyTOTP()">
      </div>
      <div class="error" id="totp-error">Invalid code</div>
      <button class="btn btn-accent" id="totp-btn" onclick="verifyTOTP()">Verify</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Authenticating...</div>
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  if (!u || !p) { showError('Please enter username and password'); return; }

  document.getElementById('login-btn').disabled = true;
  showLoading(true);

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();

    if (res.status === 200 && data.status === 'ok') {
      window.location.href = '/';
    } else if (res.status === 200 && data.status === 'need_2fa') {
      showLogin(false);
      showTOTP(true);
    } else {
      showError(data.message || 'Invalid credentials');
      document.getElementById('login-btn').disabled = false;
    }
  } catch (e) {
    showError('Connection error: ' + e.message);
    document.getElementById('login-btn').disabled = false;
  }
  showLoading(false);
}

async function verifyTOTP() {
  const code = document.getElementById('totp-code').value.trim();
  if (code.length !== 6) { showTOTPError('Enter a 6-digit code'); return; }

  document.getElementById('totp-btn').disabled = true;
  showLoading(true);

  try {
    const res = await fetch('/api/verify-2fa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (res.status === 200 && data.status === 'ok') {
      window.location.href = '/';
    } else {
      showTOTPError(data.message || 'Invalid code');
      document.getElementById('totp-btn').disabled = false;
    }
  } catch (e) {
    showTOTPError('Connection error');
    document.getElementById('totp-btn').disabled = false;
  }
  showLoading(false);
}

function showLogin(show) {
  document.getElementById('login-screen').style.display = show ? 'block' : 'none';
  document.getElementById('login-error').style.display = 'none';
}
function showTOTP(show) {
  document.getElementById('totp-screen').style.display = show ? 'block' : 'none';
  document.getElementById('totp-error').style.display = 'none';
  if (show) document.getElementById('totp-code').focus();
}
function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
  document.getElementById('login-screen').style.display = show ? 'none' : 'block';
}
function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}
function showTOTPError(msg) {
  const el = document.getElementById('totp-error');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
